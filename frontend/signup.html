<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — The Compendium</title>
  <meta name="description" content="Create a free Compendium account to start tracking your game library.">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="auth-page">

  <header>
    <div class="container">
      <nav class="main-nav">
        <a href="/index.html" class="nav-logo-link"><h1>The Compendium</h1></a>
        <div id="nav-auth" class="nav-auth"></div>
      </nav>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-card">

      <div class="auth-brand">
        <h2 class="auth-heading">Create your account</h2>
        <p class="auth-subheading">Start tracking your game library for free</p>
      </div>

      <div id="auth-error" class="auth-error hidden"></div>

      <form id="signup-form" class="auth-form" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username"
            placeholder="e.g. Akshat_99"
            autocomplete="username" required minlength="2" maxlength="30" />
          <span class="form-hint">Letters, numbers, _, ., – only. 2–30 characters.</span>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email"
            placeholder="you@example.com"
            autocomplete="email" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-with-toggle">
            <input type="password" id="password" name="password"
              placeholder="At least 6 characters"
              autocomplete="new-password" required minlength="6" />
            <button type="button" id="toggle-pw" class="pw-toggle" aria-label="Toggle password">👁</button>
          </div>
        </div>

        <button type="submit" id="signup-btn" class="submit-btn auth-submit-btn">Create Account</button>
      </form>

      <p class="auth-switch">
        Already have an account? <a href="/login.html">Sign in</a>
      </p>
    </div>
  </main>

  <script src="auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var AUTH_API    = window.API_BASE + '/api/auth';
      var signupForm  = document.getElementById('signup-form');
      var signupBtn   = document.getElementById('signup-btn');
      var errorBanner = document.getElementById('auth-error');
      var togglePw    = document.getElementById('toggle-pw');
      var pwInput     = document.getElementById('password');

      // If already logged in, go to index
      window.__authReady.then(function (auth) {
        if (auth.authenticated) {
          window.location.href = '/index.html';
        }
      });

      // Password toggle
      togglePw.addEventListener('click', function () {
        pwInput.type = pwInput.type === 'password' ? 'text' : 'password';
        togglePw.textContent = pwInput.type === 'password' ? '👁' : '🙈';
      });

      // Form submit
      signupForm.addEventListener('submit', async function (e) {
        e.preventDefault();
        errorBanner.classList.add('hidden');

        var username = document.getElementById('username').value.trim();
        var email    = document.getElementById('email').value.trim();
        var password = pwInput.value;

        if (!username || !email || !password) {
          showError('Please fill in all fields.');
          return;
        }

        signupBtn.disabled    = true;
        signupBtn.textContent = 'Creating account…';

        try {
          var res  = await fetch(AUTH_API + '/signup', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ username: username, email: email, password: password }),
            credentials: 'include'
          });
          var data = await res.json();

          if (!res.ok) {
            showError(data.error || 'Signup failed. Please try again.');
            return;
          }

          // Fetch fresh auth state before redirecting
          var meRes = await fetch(window.API_BASE + '/api/auth/me', {
            credentials: 'include',
            cache: 'no-store'
          });
          var meData = await meRes.json();
          console.log("ME RESPONSE (SIGNUP):", meData);

          if (meData.authenticated) {
            // Auto-logged-in after signup — go to library
            window.location.href = '/library.html';
          } else {
            showError('Session validation failed. Please try signing in manually.');
          }

        } catch (err) {
          console.error('Signup error:', err);
          showError('Network error. Is the server running?');
        } finally {
          signupBtn.disabled    = false;
          signupBtn.textContent = 'Create Account';
        }
      });

      function showError(msg) {
        errorBanner.textContent = msg;
        errorBanner.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
